
server.port=8092

spring.data.mongodb.uri=mongodb://localhost:27017/fitnessactivity
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# RabbitMQ Connection Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ Custom Properties (for your service)
rabbitmq.exchange=fitness.exchange
rabbitmq.queue=activity.queue
rabbitmq.routing-key=activity.tracking