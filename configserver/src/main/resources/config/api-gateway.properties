server.port=8081

# OAuth2 Resource Server JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8070/realms/fitness-oauth2
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8070/realms/fitness-oauth2/protocol/openid-connect/certs

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Gateway Configuration - DISABLE auto-discovery to use only custom routes
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# Actuator endpoints for debugging
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging for debugging (can reduce after testing)
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG